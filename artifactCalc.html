<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유물 계산기</title>
  <link rel="stylesheet" href="style.css">

  <script src="artifacts.js"></script>
  <script src="artifactCalc.js"></script>
  <script src="common.js"></script>
  <link rel="icon" href="mainImg.png">
</head>
<body>

  <div class="wrapper">
    <div class="container">
      <aside class="sidebar">
        <div class="logo">이류월드 계산기</div>
        <ul class="menu">
          <li><a href="index.html">홈</a></li>
          <li><a href="#" onclick="fnMachine();">환포 계산기</a></li>
          <li><a href="#" onclick="fnExpPage();">경험치 계산기</a></li>
          <li><a href="#" onclick="fnArtifactPage();" class="active">유물 계산기</a></li>
          <li><a href="#" onclick="fnRPSkillPage();">RP 스킬 계산기</a></li>
          <li><a href="transcend.html" class="active">초월 정보</a></li>
        </ul>
      </aside>

      <main class="content">
        <div class="top-banner">
          <h1>🔮 유물 계산기</h1>
          <p>총 수호자의 돌과 선택한 유물을 기준으로 배분 결과를 계산합니다.</p>
        </div>

        <section class="calc-card">
          <div class="form-list">
            <div class="form-row">
              <label for="totalStone">총 수호자의 돌</label>
              <input type="number" id="totalStone" value="30000" min="0">
            </div>
          </div>

          <div class="action-area">
            <button type="button" class="btn" onclick="selectAllArtifacts()">전체 선택</button>
            <button type="button" class="btn" onclick="clearAllArtifacts()">전체 해제</button>
          </div>

          <h2 class="section-title">유물 선택</h2>
          <div class="artifact-list" id="artifactList"></div>

          <div class="action-area">
            <button type="button" class="btn btn-green" onclick="calculateArtifacts()">계산하기</button>
            <button type="button" class="btn" onclick="fnBack()">뒤로가기</button>
          </div>

          <div class="result-box" id="summaryBox">
            총 선택 유물 수: 0<br>
            총 사용 돌: 0<br>
            총 남은 돌: 0
          </div>

          <div class="result-box" style="margin-top:20px; overflow-x:auto;">
            <table>
              <thead>
                <tr>
                  <th>번호</th>
                  <th>유물</th>
                  <th>배분량</th>
                  <th>도달 레벨</th>
                  <th>사용 돌</th>
                  <th>남은 돌</th>
                  <th>만렙</th>
                </tr>
              </thead>
              <tbody id="result"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    function initArtifactList() {
      const container = document.getElementById("artifactList");
      container.innerHTML = "";

      window.ARTIFACT_KEYS.forEach((key) => {
        const art = window.ARTIFACTS[key];

        const label = document.createElement("label");
        label.className = "artifact-item";

        label.innerHTML = `
          <span class="artifact-name">${art.name}</span>
          <input type="checkbox" value="${key}">
        `;

        container.appendChild(label);
      });
    }

    function getSelectedArtifacts() {
      const checked = document.querySelectorAll("#artifactList input:checked");
      return Array.from(checked).map((el) => el.value);
    }

    function selectAllArtifacts() {
      document.querySelectorAll("#artifactList input[type='checkbox']")
        .forEach((el) => {
          el.checked = true;
        });
    }

    function clearAllArtifacts() {
      document.querySelectorAll("#artifactList input[type='checkbox']")
        .forEach((el) => {
          el.checked = false;
        });
    }

    function calculateArtifacts() {
      const totalStone = Number(document.getElementById("totalStone").value);
      const selectedIds = getSelectedArtifacts();

      if (!Number.isFinite(totalStone) || totalStone < 0) {
        alert("총 수호자의 돌을 올바르게 입력하세요.");
        return;
      }

      if (selectedIds.length === 0) {
        alert("유물을 하나 이상 선택하세요.");
        return;
      }

      try {
        const result = distributeArtifactStones(totalStone, selectedIds);
        renderArtifactTable(result.rows);
        renderSummary(result);
      } catch (error) {
        console.error(error);
        alert(error.message || "계산 중 오류가 발생했습니다.");
      }
    }

    function renderArtifactTable(rows) {
      const tbody = document.getElementById("result");
      tbody.innerHTML = "";

      rows.forEach((row) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${row.no}</td>
          <td>${row.name}</td>
          <td>${formatNumber(row.allocatedStone)}</td>
          <td>${formatNumber(row.reachedLevel)}</td>
          <td>${formatNumber(row.usedStone)}</td>
          <td>${formatNumber(row.remainStone)}</td>
          <td>${row.maxCheck}</td>
        `;

        tbody.appendChild(tr);
      });
    }

    function renderSummary(result) {
      const box = document.getElementById("summaryBox");
      box.innerHTML = `
        총 선택 유물 수: ${formatNumber(result.artifactCount)}<br>
        총 사용 돌: ${formatNumber(result.usedStone)}<br>
        총 남은 돌: ${formatNumber(result.remainingStone)}
      `;
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString("ko-KR");
    }

    function fnBack() {
      window.location.href = "index.html";
    }

    initArtifactList();
  </script>
</body>
</html>
