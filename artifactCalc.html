<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>유물 계산기</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      margin-top: 30px;
    }

    .box {
      background: white;
      padding: 30px;
      margin: auto;
      width: 640px;
      border-radius: 20px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }

    input[type="number"] {
      width: 100%;
      padding: 10px;
      margin: 10px 0 16px;
      box-sizing: border-box;
    }

    .artifact-list {
      text-align: left;
      margin-top: 10px;
      max-height: 260px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fafafa;
    }

    .artifact-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 4px;
      border-bottom: 1px solid #eee;
    }

    .artifact-item:last-child {
      border-bottom: none;
    }

    .artifact-item:hover {
      background: #f0f0f0;
      border-radius: 6px;
    }

    .artifact-name {
      font-size: 14px;
    }

    .artifact-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
      flex-shrink: 0;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    table {
      margin-top: 20px;
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      font-size: 12px;
      text-align: center;
    }

    th {
      background: #4CAF50;
      color: white;
    }

    .summary {
      margin-top: 18px;
      text-align: left;
      font-size: 14px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
    }
  </style>

  <script src="artifacts.js"></script>
  <script src="artifactCalc.js"></script>
  <script src="common.js"></script>
</head>
<body>

  <div class="box">
    <h2>🔮 유물 계산기</h2>

    <label for="totalStone">총 수호자의 돌</label>
    <input type="number" id="totalStone" value="30000" min="0">

    <h3>유물 선택</h3>

    <div class="button-row">
      <button type="button" onclick="selectAllArtifacts()">전체 선택</button>
      <button type="button" onclick="clearAllArtifacts()">전체 해제</button>
    </div>

    <div class="artifact-list" id="artifactList"></div>

    <div class="button-row">
      <button type="button" onclick="calculateArtifacts()">계산하기</button>
      <button type="button" onclick="fnBack()">뒤로가기</button>
    </div>

    <div class="summary" id="summaryBox">
      총 선택 유물 수: 0<br>
      총 사용 돌: 0<br>
      총 남은 돌: 0
    </div>

    <table>
      <thead>
        <tr>
          <th>번호</th>
          <th>유물</th>
          <th>배분량</th>
          <th>도달 레벨</th>
          <th>사용 돌</th>
          <th>남은 돌</th>
          <th>만렙</th>
        </tr>
      </thead>
      <tbody id="result"></tbody>
    </table>
  </div>

  <script>
    function initArtifactList() {
      const container = document.getElementById("artifactList");
      container.innerHTML = "";

      window.ARTIFACT_KEYS.forEach((key) => {
        const art = window.ARTIFACTS[key];

        const label = document.createElement("label");
        label.className = "artifact-item";

        label.innerHTML = `
          <span class="artifact-name">${art.name}</span>
          <input type="checkbox" value="${key}">
        `;

        container.appendChild(label);
      });
    }

    function getSelectedArtifacts() {
      const checked = document.querySelectorAll("#artifactList input:checked");
      return Array.from(checked).map((el) => el.value);
    }

    function selectAllArtifacts() {
      document.querySelectorAll("#artifactList input[type='checkbox']")
        .forEach((el) => {
          el.checked = true;
        });
    }

    function clearAllArtifacts() {
      document.querySelectorAll("#artifactList input[type='checkbox']")
        .forEach((el) => {
          el.checked = false;
        });
    }

    function calculateArtifacts() {
      const totalStone = Number(document.getElementById("totalStone").value);
      const selectedIds = getSelectedArtifacts();

      if (!Number.isFinite(totalStone) || totalStone < 0) {
        alert("총 수호자의 돌을 올바르게 입력하세요.");
        return;
      }

      if (selectedIds.length === 0) {
        alert("유물을 하나 이상 선택하세요.");
        return;
      }

      try {
        const result = distributeArtifactStones(totalStone, selectedIds);
        renderArtifactTable(result.rows);
        renderSummary(result);
      } catch (error) {
        console.error(error);
        alert(error.message || "계산 중 오류가 발생했습니다.");
      }
    }

    function renderArtifactTable(rows) {
      const tbody = document.getElementById("result");
      tbody.innerHTML = "";

      rows.forEach((row) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${row.no}</td>
          <td>${row.name}</td>
          <td>${formatNumber(row.allocatedStone)}</td>
          <td>${formatNumber(row.reachedLevel)}</td>
          <td>${formatNumber(row.usedStone)}</td>
          <td>${formatNumber(row.remainStone)}</td>
          <td>${row.maxCheck}</td>
        `;

        tbody.appendChild(tr);
      });
    }

    function renderSummary(result) {
      const box = document.getElementById("summaryBox");
      box.innerHTML = `
        총 선택 유물 수: ${formatNumber(result.artifactCount)}<br>
        총 사용 돌: ${formatNumber(result.usedStone)}<br>
        총 남은 돌: ${formatNumber(result.remainingStone)}
      `;
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString("ko-KR");
    }

    function fnBack() {
      window.location.href = "index.html";
    }

    initArtifactList();
  </script>
</body>
</html>
