<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>유물 계산기</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      margin-top: 30px;
    }

    .box {
      background: white;
      padding: 30px;
      margin: auto;
      width: 600px;
      border-radius: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
    }

    .artifact-list {
      text-align: left;
      margin-top: 10px;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
    }

    .artifact-list label {
      display: block;
      margin: 3px 0;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    table {
      margin-top: 20px;
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 6px;
      font-size: 12px;
    }

    th {
      background: #4CAF50;
      color: white;
    }
  </style>

  <script src="artifacts.js"></script>
  <script src="artifactCalc.js"></script>
  <script src="common.js"></script>
</head>

<body>

<div class="box">
  <h2>🔮 유물 계산기</h2>

  <label>총 수호자의 돌</label>
  <input type="number" id="totalStone" value="30000">

  <h3>유물 선택</h3>

  <button onclick="selectAll()">전체 선택</button>
  <button onclick="clearAll()">전체 해제</button>

  <div class="artifact-list" id="artifactList"></div>

  <button onclick="calculate()">계산하기</button>
  <button onclick="fnBack()">뒤로가기</button>

  <table>
    <thead>
      <tr>
        <th>번호</th>
        <th>유물</th>
        <th>배분량</th>
        <th>도달 레벨</th>
        <th>사용 돌</th>
        <th>남은 돌</th>
        <th>만렙</th>
      </tr>
    </thead>
    <tbody id="result"></tbody>
  </table>
</div>

<script>

// =======================
// 유물 목록 생성
// =======================
function initArtifactList() {
  const container = document.getElementById("artifactList");

  window.ARTIFACT_KEYS.forEach(key => {
    const art = window.ARTIFACTS[key];

    const label = document.createElement("label");

    label.innerHTML = `
      <input type="checkbox" value="${key}">
      ${art.name}
    `;

    container.appendChild(label);
  });
}

// =======================
// 선택된 유물 가져오기
// =======================
function getSelectedArtifacts() {
  const checked = document.querySelectorAll("#artifactList input:checked");
  return Array.from(checked).map(el => el.value);
}

// =======================
// 전체 선택
// =======================
function selectAll() {
  document.querySelectorAll("#artifactList input")
    .forEach(el => el.checked = true);
}

// =======================
// 전체 해제
// =======================
function clearAll() {
  document.querySelectorAll("#artifactList input")
    .forEach(el => el.checked = false);
}

// =======================
// 계산 실행
// =======================
function calculate() {
  const total = Number(document.getElementById("totalStone").value);
  const ids = getSelectedArtifacts();

  if (ids.length === 0) {
    alert("유물을 선택하세요");
    return;
  }

  const result = distributeArtifactStones(total, ids);
  render(result.rows);
}

// =======================
// 테이블 출력
// =======================
function render(rows) {
  const tbody = document.getElementById("result");
  tbody.innerHTML = "";

  rows.forEach(r => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.no}</td>
      <td>${r.name}</td>
      <td>${r.allocatedStone}</td>
      <td>${r.reachedLevel}</td>
      <td>${r.usedStone}</td>
      <td>${r.remainStone}</td>
      <td>${r.maxCheck}</td>
    `;

    tbody.appendChild(tr);
  });
}

// 뒤로가기
function fnBack() {
  window.location.href = "index.html";
}

// 실행
initArtifactList();

</script>

</body>
</html>
