        .box {
            background: white;
            padding: 40px;

        }

</head>

<body>

        <button onclick="fnalert('건버드의 테스트');">눌러봐</button>
        <button onclick="fnExpPage();">경험치 계산기</button>
    </div>
</body>
</html>
