<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이류월드 계산기</title>
  <script>(function(){var p=localStorage.getItem('iryu_theme')||'system';var t=p;if(p==='system')t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)})()</script>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/common.js"></script>
  <link rel="icon" href="assets/mainImg.png">
</head>
<body>
<div class="wrapper">
  <div class="container">

    <aside class="sidebar"></aside>

    <main class="content">
      <div class="top-banner">
        <h1>이류월드</h1>
        <p>이세계에선 내가 1억 과금러!?</p>
      </div>

      <section class="calc-card link-card-grid">
        <div class="result-section">
          <div class="result-title">안녕하세요.</div>
          <div class="result-box">
            <p style="margin-bottom: 14px;">
              해당 버튼 클릭 시 이류월드로 이동합니다.
            </p>
            <a href="https://maplestoryworlds.nexon.com/ko/play/a39450cd781d418190b9d4419c330eac/" class="btn-discord" target="_blank" rel="noopener noreferrer">이동하기</a>
          </div>
        </div>

        <div class="result-section">
          <div class="result-title">디스코드</div>
          <div class="result-box">
            <p style="margin-bottom: 14px;">
              해당 버튼 클릭 시 이류월드의 디스코드로 이동합니다.
            </p>
            <a href="https://discord.gg/WjDNES7n4t" class="btn-discord" target="_blank" rel="noopener noreferrer">이동하기</a>
          </div>
        </div>
      </section>

      <section class="calc-card image-tab-card">
        <div class="image-guide-head">
          <div>
            <div class="result-title">기초 가이드</div>
            <p class="image-guide-subtitle">원하는 가이드를 선택하면 아래에서 크게 볼 수 있습니다.</p>
          </div>
          <span class="image-guide-count">탭 7개 · 공략 6장</span>
        </div>

        <div class="image-tab-menu" id="imageTabMenu"></div>

        <div class="image-viewer">
          <button type="button" class="image-slide-btn image-slide-prev" id="imageSlidePrev" aria-label="이전 이미지">‹</button>
          <img id="tabImage" src="" alt="탭 이미지">
          <button type="button" class="image-slide-btn image-slide-next" id="imageSlideNext" aria-label="다음 이미지">›</button>
        </div>
        <div class="image-slide-dots" id="imageSlideDots" aria-label="공략 이미지 순서"></div>

        <div class="result-box image-caption" id="tabCaption">
          이미지를 선택해주세요.
        </div>
      </section>

      <section class="calc-card" style="margin-top: 24px;">
        <div class="result-section">
          <div class="result-title">기여자</div>
          <div class="contributors">
            <div class="contributor">
              <img src="assets/건버드.png" alt="건버드" class="contributor-img">
              <span class="contributor-name">건버드</span>
            </div>
            <div class="contributor">
              <img src="assets/카츠키치.png" alt="카츠키치" class="contributor-img">
              <span class="contributor-name">카츠키치</span>
            </div>
            <div class="contributor">
              <img src="assets/혀니.png" alt="혀니" class="contributor-img">
              <span class="contributor-name">혀니</span>
            </div>
            <div class="contributor">
              <img src="assets/아크라시엘.png" alt="아크라시엘" class="contributor-img">
              <span class="contributor-name">아크라시엘</span>
            </div>
          </div>
        </div>
      </section>
    </main>

  </div>
</div>
<div class="img-overlay" id="imgOverlay" onclick="this.classList.remove('show')">
  <img id="overlayImg" src="" alt="">
</div>
<script>
  const imgOverlay = document.getElementById("imgOverlay");
  const overlayImg = document.getElementById("overlayImg");

  function openImageOverlay(src, alt = "") {
    overlayImg.src = src;
    overlayImg.alt = alt;
    imgOverlay.classList.add("show");
  }

  // 기여자 이미지 클릭 시 확대
  document.querySelectorAll(".contributor-img").forEach(img => {
    img.addEventListener("click", () => {
      openImageOverlay(img.src, img.alt);
    });
  });

  // 확대된 이미지 자체를 눌렀을 때 닫히지 않게 처리
  overlayImg.addEventListener("click", (event) => {
    event.stopPropagation();
  });

  // ESC 키로 닫기
  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      imgOverlay.classList.remove("show");
    }
  });
</script>
<script>
  const imageTabs = [
    {
      title: "공략",
      image: "assets/tab/img1.png",
      images: [
        "assets/tab/img1.png",
        "assets/tab/beginner-guide-1.png",
        "assets/tab/beginner-guide-2.png",
        "assets/tab/beginner-guide-3.png",
        "assets/tab/beginner-guide-4.png",
        "assets/tab/beginner-guide-5.png"
      ],
      text: "기초 공략 가이드입니다. 좌우 버튼 또는 스와이프로 이어지는 공략 이미지를 넘겨볼 수 있습니다."
    },
    {
      title: "스킬 및 환생 추천 트리",
      image: "assets/tab/img2.png",
      text: "질문은 디스코드 잡담방 혹은 질문-답변방에 올려주시면 답해드리겠습니다."
    },
    {
      title: "추천 사냥터",
      image: "assets/tab/img7.png",
      text: "추천 사냥터 입니다. 자리가 없으면 몬스터DB에서 원킬컷이 나는 사냥터 가셔도 무방합니다."
    },
    {
      title: "RP스킬 추천",
      image: "assets/tab/img4.png",
      text: "RP스킬 추천 트리 입니다."
    },
    {
      title: "이세계스킬 추천",
      image: "assets/tab/img3.png",
      text: "달성 예정이 정답은 아닙니다. 그리고 추천이니 다르게 하셔도 무방합니다."
    },
    {
      title: "도감 갯수",
      image: "assets/tab/img5.png",
      text: "젬 가격별 도감 갯수 입니다."
    },
    {
      title: "초월시 추천 RP",
      image: "assets/tab/img6.png",
      text: "초월한 직후 기본 제공되는 RP로 찍는 추천 RP 입니다."
    }
  ];

  const imageTabMenu = document.getElementById("imageTabMenu");
  const tabImage = document.getElementById("tabImage");
  const tabCaption = document.getElementById("tabCaption");
  const imageSlidePrev = document.getElementById("imageSlidePrev");
  const imageSlideNext = document.getElementById("imageSlideNext");
  const imageSlideDots = document.getElementById("imageSlideDots");
  let activeTabIndex = 0;
  let activeSlideIndex = 0;

  function getActiveImages() {
    const data = imageTabs[activeTabIndex];
    return data.images || [data.image];
  }

  function renderImageSlide() {
    const data = imageTabs[activeTabIndex];
    const images = getActiveImages();
    const hasSlides = images.length > 1;

    if (activeSlideIndex >= images.length) {
      activeSlideIndex = 0;
    }

    tabImage.src = images[activeSlideIndex];
    tabImage.alt = hasSlides ? `${data.title} ${activeSlideIndex + 1}` : data.title;
    imageSlidePrev.hidden = !hasSlides;
    imageSlideNext.hidden = !hasSlides;
    imageSlideDots.hidden = !hasSlides;

    imageSlideDots.innerHTML = "";
    images.forEach((_, index) => {
      const dot = document.createElement("button");
      dot.type = "button";
      dot.className = "image-slide-dot";
      dot.setAttribute("aria-label", `${index + 1}번째 공략 이미지`);
      dot.classList.toggle("active", index === activeSlideIndex);
      dot.addEventListener("click", () => {
        activeSlideIndex = index;
        renderImageSlide();
      });
      imageSlideDots.appendChild(dot);
    });
  }

  function moveImageSlide(direction) {
    const images = getActiveImages();
    activeSlideIndex = (activeSlideIndex + direction + images.length) % images.length;
    renderImageSlide();
  }

  function renderImageTab(index) {
    const data = imageTabs[index];
    activeTabIndex = index;
    activeSlideIndex = 0;

    renderImageSlide();
    tabCaption.textContent = data.text;

    document.querySelectorAll(".image-tab-btn").forEach((btn, i) => {
      btn.classList.toggle("active", i === index);
    });
  }

  imageTabs.forEach((item, index) => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "image-tab-btn";
    button.textContent = item.title;

    button.addEventListener("click", () => {
      renderImageTab(index);
    });

    imageTabMenu.appendChild(button);
  });

  renderImageTab(0);

  imageSlidePrev.addEventListener("click", () => moveImageSlide(-1));
  imageSlideNext.addEventListener("click", () => moveImageSlide(1));

  let imageTouchStartX = 0;

  tabImage.addEventListener("touchstart", (event) => {
    imageTouchStartX = event.changedTouches[0].clientX;
  }, { passive: true });

  tabImage.addEventListener("touchend", (event) => {
    const diff = event.changedTouches[0].clientX - imageTouchStartX;
    if (Math.abs(diff) > 45 && getActiveImages().length > 1) {
      moveImageSlide(diff > 0 ? -1 : 1);
    }
  }, { passive: true });

  // 기초 가이드 탭 이미지 클릭 시 확대
  tabImage.addEventListener("click", () => {
    openImageOverlay(tabImage.src, tabImage.alt);
  });
</script>
</body>
</html>
