<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>환포 계산기 - 이류월드</title>
  <link rel="stylesheet" href="../../css/style.css">
  <script src="../../js/common.js"></script>
  <link rel="icon" href="../../assets/mainImg.png">
</head>
<body>
<div class="wrapper">
  <div class="container">

    <aside class="sidebar"></aside>

    <main class="content">
      <div class="top-banner">
        <h1>환포 계산기</h1>
        <p>원하는 환포 수치와 배율을 입력하면 필요한 레벨과 실제 획득량을 계산합니다.</p>
      </div>

      <section class="calc-card">
        <div class="form-list">
          <div class="form-row">
            <label for="targetHanpo">원하는 환포 (A)</label>
            <input type="number" id="targetHanpo" value="1076906704977" min="0">
          </div>

          <div class="form-row">
            <label for="rpShop">RP상점 환포 (%)</label>
            <input type="number" id="rpShop" value="400" min="0">
          </div>

          <div class="form-row">
            <label for="encyclopedia">도감 수치 (%)</label>
            <input type="number" id="encyclopedia" value="123" min="0">
          </div>

          <div class="form-row">
            <label for="artifactRing">유물 반지 (%)</label>
            <input type="number" id="artifactRing" value="0" min="0">
          </div>

          <div class="form-row">
            <label for="vip">VIP (%)</label>
            <input type="number" id="vip" value="10" min="0">
          </div>

          <div class="form-row">
            <label for="transcendLevel">초월 레벨</label>
            <input type="number" id="transcendLevel" value="7" min="0" max="10">
          </div>

          <div class="form-row">
            <label for="hourglassLevel">모래시계 레벨</label>
            <input type="number" id="hourglassLevel" value="0" min="0" max="20">
          </div>

          <div class="form-row">
            <label for="currentLevel">내 현재 레벨</label>
            <input type="number" id="currentLevel" value="500" min="1" max="500">
          </div>
        </div>

        <div class="action-area">
          <button type="button" class="btn btn-green btn-large" onclick="doCalc()">계산하기</button>
        </div>

        <div id="result" class="result-box">여기에 결과가 표시됩니다.</div>
      </section>
    </main>

  </div>
</div>

<script type="module">
  import { initHanpoData, calculateHanpo } from "../../js/calc/rpMachine.js";
  import { saveInputs, loadInputs } from "../../js/storage.js";

  await initHanpoData("../..");

  const INPUT_IDS = ["targetHanpo", "rpShop", "encyclopedia", "artifactRing", "vip", "transcendLevel", "hourglassLevel", "currentLevel"];

  // 저장된 값 복원
  const saved = loadInputs("rpMachine");
  if (saved) {
    for (const id of INPUT_IDS) {
      if (saved[id] !== undefined) document.getElementById(id).value = saved[id];
    }
  }

  // 입력 변경 시 저장
  for (const id of INPUT_IDS) {
    document.getElementById(id).addEventListener("change", () => {
      const data = {};
      for (const id of INPUT_IDS) data[id] = document.getElementById(id).value;
      saveInputs("rpMachine", data);
    });
  }

  function fmt(n) {
    if (n === null || n === undefined) return "-";
    return Math.round(n).toLocaleString("ko-KR");
  }

  window.doCalc = function () {
    const resultEl = document.getElementById("result");

    const params = {
      targetHanpo: Number(document.getElementById("targetHanpo").value) || 0,
      rpShopPercent: Number(document.getElementById("rpShop").value) || 0,
      encyclopediaPercent: Number(document.getElementById("encyclopedia").value) || 0,
      artifactRingPercent: Number(document.getElementById("artifactRing").value) || 0,
      vipPercent: Number(document.getElementById("vip").value) || 0,
      transcendLevel: Number(document.getElementById("transcendLevel").value) || 0,
      hourglassLevel: Number(document.getElementById("hourglassLevel").value) || 0,
      currentLevel: Number(document.getElementById("currentLevel").value) || 500,
    };

    const r = calculateHanpo(params);

    resultEl.innerHTML = `
      <div class="result-section">
        <div class="result-title">배율 정보</div>
        <div class="result-row">
          <span class="result-label">환포 배율 (D)</span>
          <strong class="result-value">${r.hanpoMultiplier.toFixed(4)}</strong>
        </div>
        <div class="result-row">
          <span class="result-label">초월 배율 (D1)</span>
          <strong class="result-value">${r.transcendMult.toFixed(2)}</strong>
        </div>
        <div class="result-row">
          <span class="result-label">초월 환포 배율 (D×D1)</span>
          <strong class="result-value">${r.combinedMult.toFixed(4)}</strong>
        </div>
        <div class="result-row">
          <span class="result-label">모래시계 배율 (X)</span>
          <strong class="result-value">${r.hourglassMult.toFixed(2)}</strong>
        </div>
        <div class="result-row">
          <span class="result-label">최종 배율 (R)</span>
          <strong class="result-value highlight">${r.finalMultiplier.toFixed(4)}</strong>
        </div>
      </div>

      <div class="result-section">
        <div class="result-title">환포 계산 결과</div>
        <div class="result-row">
          <span class="result-label">기준 환포 (A÷R)</span>
          <strong class="result-value">${fmt(r.baseHanpoNeeded)}</strong>
        </div>
        <div class="result-row">
          <span class="result-label">획득 레벨</span>
          <strong class="result-value highlight">${r.acquiredLevel !== null ? r.acquiredLevel : "해당 없음"}</strong>
        </div>
        <div class="result-row">
          <span class="result-label">해당 레벨 기본 환포</span>
          <strong class="result-value">${fmt(r.acquiredBaseHanpo)}</strong>
        </div>
        <div class="result-row">
          <span class="result-label">실제 획득 환포 (기본×D2)</span>
          <strong class="result-value">${fmt(r.actualHanpo)}</strong>
        </div>
      </div>

      <div class="result-section">
        <div class="result-title">현재 레벨 (${r.currentLevel}) 정보</div>
        <div class="result-row">
          <span class="result-label">기본 환포</span>
          <strong class="result-value">${fmt(r.currentBaseHanpo)}</strong>
        </div>
        <div class="result-row">
          <span class="result-label">배율 적용 환포 (기본×D2)</span>
          <strong class="result-value">${fmt(r.currentHanpoWithMult)}</strong>
        </div>
        <div class="result-row">
          <span class="result-label">윤회 축복 배율</span>
          <strong class="result-value">${r.rebirthMult.toFixed(2)}</strong>
        </div>
        <div class="result-row">
          <span class="result-label">윤회 축복 환포</span>
          <strong class="result-value highlight">${fmt(r.rebirthHanpo)}</strong>
        </div>
      </div>
    `;
  };
</script>
</body>
</html>
