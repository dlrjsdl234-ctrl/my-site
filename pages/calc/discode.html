<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RP 스킬 계산기 - 이류월드</title>
  <script>(function(){var p=localStorage.getItem('iryu_theme')||'system';var t=p;if(p==='system')t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)})()</script>
  <link rel="stylesheet" href="../../css/style.css">
  <script src="../../js/common.js"></script>
  <link rel="icon" href="../../assets/mainImg.png">
</head>
<body>
    <div class="wrapper">
    <div class="container">

        <aside class="sidebar"></aside>

        <main class="content">
        <div class="top-banner">
            <h1>디스코드 특수문자</h1>
            <p></p>
        </div>

        <div class="calc-card">
            <div class="result-title">디스코드 특수문자</div>

            <div class="rp-skill-wrap table-wrap">
            <table id="rpSkillTable" class="rp-skill-table discord-format-table">
                <thead>
                    <tr>
                        <th>입력 형식</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td><strong>*기울임*</strong></td></tr>
                    <tr><td><strong>_기울임_</strong></td></tr>
                    <tr><td><strong>**굵게**</strong></td></tr>
                    <tr><td><strong>***굵게 + 기울임***</strong></td></tr>
                    <tr><td><strong>__밑줄__</strong></td></tr>
                    <tr><td><strong>~~취소선~~</strong></td></tr>
                    <tr><td><strong>__*밑줄 + 기울임*__</strong></td></tr>
                    <tr><td><strong>__**밑줄 + 굵게**__</strong></td></tr>
                    <tr><td><strong>__***밑줄 + 굵게 + 기울임***__</strong></td></tr>
                    <tr><td><strong>||스포일러||</strong></td></tr>
                    <tr><td><strong># 큰 제목</strong></td></tr>
                    <tr><td><strong>## 중간 제목</strong></td></tr>
                    <tr><td><strong>### 작은 제목</strong></td></tr>
                    <tr><td><strong>-# 작은 회색 보조글</strong></td></tr>
                    <tr><td><strong>&gt; 한 줄 인용문</strong></td></tr>
                    <tr><td><strong>&gt;&gt;&gt; 여러 줄 인용문 이렇게 계속</strong></td></tr>
                    <tr><td><strong>`짧은 코드`</strong></td></tr>
                    <tr><td><strong>```txt 여러 줄 코드블록 여기에 적기```</strong></td></tr>
                    <tr><td><strong>[보이는 글자](https://example.com)</strong></td></tr>
                </tbody>
            </table>
            </div>
        </div>
        </main>

    </div>
    </div>
</body>
</html>
