<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유물 계산기 - 이류월드</title>
  <link rel="stylesheet" href="../../css/style.css">
  <script src="../../js/common.js"></script>
  <link rel="icon" href="../../assets/mainImg.png">
</head>
<body>
<div class="wrapper">
  <div class="container">

    <aside class="sidebar"></aside>

    <main class="content">
      <div class="top-banner">
        <h1>유물 계산기</h1>
        <p>총 수호자의 돌과 선택한 유물을 기준으로 배분 결과를 계산합니다.</p>
      </div>

      <section class="calc-card">
        <div class="form-list">
          <div class="form-row">
            <label for="totalStone">총 수호자의 돌</label>
            <input type="number" id="totalStone" value="30000" min="0">
          </div>
        </div>

        <h2 class="section-title">유물 선택</h2>
        <div class="artifact-list" id="artifactList"></div>

        <div class="action-area">
          <button type="button" class="btn btn-green" onclick="calculateArtifacts()">계산하기</button>
        </div>

        <div class="result-box" id="summaryBox">
          총 선택 유물 수: 0<br>
          총 사용 돌: 0<br>
          총 남은 돌: 0
        </div>

        <div class="result-box" style="margin-top:20px; overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>번호</th>
                <th>유물</th>
                <th>배분량</th>
                <th>도달 레벨</th>
                <th>사용 돌</th>
                <th>남은 돌</th>
                <th>만렙</th>
              </tr>
            </thead>
            <tbody id="result"></tbody>
          </table>
        </div>
      </section>
    </main>

  </div>
</div>

<script type="module">
  import { initArtifactData, getArtifactKeys, getArtifacts, distributeArtifactStones } from "../../js/calc/artifact.js";
  import { saveInputs, loadInputs } from "../../js/storage.js";

  await initArtifactData("../..");

  const ARTIFACT_KEYS = getArtifactKeys();
  const ARTIFACTS = getArtifacts();

  function formatNumber(value) {
    return Number(value || 0).toLocaleString("ko-KR");
  }

  function saveArtifactState() {
    const selectedIds = Array.from(document.querySelectorAll("#artifactList input:checked")).map(el => el.value);
    saveInputs("artifact", {
      totalStone: document.getElementById("totalStone").value,
      selectedIds
    });
  }

  function initArtifactList() {
    const container = document.getElementById("artifactList");
    container.innerHTML = "";

    const saved = loadInputs("artifact");
    if (saved?.totalStone !== undefined) {
      document.getElementById("totalStone").value = saved.totalStone;
    }
    const savedIds = saved?.selectedIds || [];

    ARTIFACT_KEYS.forEach(key => {
      const art = ARTIFACTS[key];
      const checked = savedIds.includes(key) ? "checked" : "";
      const label = document.createElement("label");
      label.className = "artifact-item";
      label.innerHTML = `
        <span class="artifact-name">${art.name} (${art.effect})</span>
        <input type="checkbox" value="${key}" ${checked}>
      `;
      container.appendChild(label);
    });

    // 입력 변경 시 저장
    container.addEventListener("change", saveArtifactState);
    document.getElementById("totalStone").addEventListener("change", saveArtifactState);
  }

  window.calculateArtifacts = function () {
    const totalStone = Number(document.getElementById("totalStone").value);
    const selectedIds = Array.from(document.querySelectorAll("#artifactList input:checked")).map(el => el.value);

    if (!Number.isFinite(totalStone) || totalStone < 0) {
      alert("총 수호자의 돌을 올바르게 입력하세요.");
      return;
    }
    if (selectedIds.length === 0) {
      alert("유물을 하나 이상 선택하세요.");
      return;
    }

    try {
      const result = distributeArtifactStones(totalStone, selectedIds);

      // 테이블 렌더링
      const tbody = document.getElementById("result");
      tbody.innerHTML = result.rows.map(row => `
        <tr>
          <td>${row.no}</td>
          <td>${row.name}</td>
          <td>${formatNumber(row.allocatedStone)}</td>
          <td>${formatNumber(row.reachedLevel)}</td>
          <td>${formatNumber(row.usedStone)}</td>
          <td>${formatNumber(row.remainStone)}</td>
          <td>${row.maxCheck}</td>
        </tr>
      `).join("");

      // 요약
      document.getElementById("summaryBox").innerHTML = `
        총 선택 유물 수: ${formatNumber(result.artifactCount)}<br>
        총 사용 돌: ${formatNumber(result.usedStone)}<br>
        총 남은 돌: ${formatNumber(result.remainingStone)}
      `;
    } catch (error) {
      alert(error.message || "계산 중 오류가 발생했습니다.");
    }
  };

  initArtifactList();
</script>
</body>
</html>
