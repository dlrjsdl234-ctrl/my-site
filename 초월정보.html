<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>초월 정보 / 특성 정보 뷰어</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 28px;
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      padding: 16px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    }

    label {
      font-weight: 700;
    }

    select {
      padding: 10px 14px;
      border: 1px solid #cfd6e4;
      border-radius: 10px;
      font-size: 16px;
      background: white;
      cursor: pointer;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      border-left: 6px solid #4b7bec;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 15px;
      color: #4b5563;
    }

    .card .value {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
      word-break: break-word;
    }

    .section {
      background: #fff;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      margin-bottom: 20px;
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .tables {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
    }

    th, td {
      border: 1px solid #d9dee8;
      padding: 10px 12px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #eef3ff;
      font-weight: 700;
    }

    tr:nth-child(even) td {
      background: #fafcff;
    }

    .muted {
      color: #6b7280;
    }

    .tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e9f2ff;
      color: #2563eb;
      font-size: 13px;
      font-weight: 700;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }

    .mini-box {
      padding: 12px;
      border: 1px solid #dbe4f0;
      border-radius: 12px;
      background: #f9fbff;
    }

    .mini-box .title {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .mini-box .desc {
      font-size: 17px;
      font-weight: 700;
      word-break: break-word;
    }

    @media (max-width: 900px) {
      .tables {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    <h1>초월 정보 / 특성 정보 뷰어</h1>

    <div class="top-bar">

      if (value === undefined || value === null || value === "") return "-";
      if (value === "?") return "미정";
      return value;
    }

      return `
        <div class="card">
          <h3>${title}</h3>
          <div class="value">${displayValue(value)}</div>
        </div>
      `;
    }

      const base = transcendData[level];
      const traits = traitData[level];

      summaryCards.innerHTML = `

        ${createSummaryCard("조건", base["조건"])}
        ${createSummaryCard("AP", base["AP"])}
        ${createSummaryCard("환생시 획득 RP", base["환생시 획득 RP"])}

        ${createSummaryCard("최종RP획득량", base["최종RP획득량"])}
      `;
