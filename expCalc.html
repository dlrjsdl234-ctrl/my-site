<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>경험치 시간 계산기</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 40px 20px;
    }

    .box {
      background: white;
      max-width: 560px;
      margin: 0 auto;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin: 0 0 24px 0;
      text-align: center;
    }

    .row {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
    }

    label {
      width: 140px;
      font-weight: bold;
      flex-shrink: 0;
    }

    input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    .btn-area {
      text-align: center;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #45a049;
    }

    #result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #f9f9f9;
      border: 1px solid #ddd;
      white-space: pre-line;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>경험치 시간 계산기</h1>

    <div class="row">
      <label for="currentLv">현재 레벨</label>
      <input type="number" id="currentLv" value="490" min="1">
    </div>

    <div class="row">
      <label for="targetLv">목표 레벨</label>
      <input type="number" id="targetLv" value="500" min="1">
    </div>

    <div class="row">
      <label for="expPerMinute">1분당 경험치</label>
      <input type="number" id="expPerMinute" value="10000000000000" min="1">
    </div>

    <div class="row">
      <label for="hourglassLv">모래시계 레벨</label>
      <input type="number" id="hourglassLv" value="0" min="0" max="20">
    </div>

    <div class="btn-area">
      <button onclick="calcExpTime()">계산하기</button>
    </div>

    <div id="result">여기에 결과가 표시됩니다.</div>
  </div>

  <script src="./exp.js"></script>
  <script>
    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      const h = String(date.getHours()).padStart(2, "0");
      const min = String(date.getMinutes()).padStart(2, "0");

      return `${y}-${m}-${d} ${h}:${min}`;
    }

    function calcExpTime() {
      const resultEl = document.getElementById("result");

      const currentLv = Number(document.getElementById("currentLv").value);
      const targetLv = Number(document.getElementById("targetLv").value);
      const expPerMinute = Number(document.getElementById("expPerMinute").value);
      const hourglassLv = Number(document.getElementById("hourglassLv").value);

      if (typeof calculateLevelUpTime !== "function") {
        resultEl.innerText = "exp.js 로딩 오류";
        return;
      }

      const result = calculateLevelUpTime(
        currentLv,
        targetLv,
        expPerMinute,
        hourglassLv
      );

      if (!result || result.error) {
        resultEl.innerText = result?.error || "오류 발생";
        return;
      }

      const now = new Date();
      const targetTime = new Date(now.getTime() + result.totalMinutes * 60000);

      resultEl.innerText =
        `기본 필요 총 경험치: ${Math.round(result.baseRequiredExp).toLocaleString()}\n` +
        `모래시계 레벨: ${hourglassLv}\n` +
        `모래시계 배율: ${result.multiplier.toFixed(1)}배\n` +
        `적용 후 필요 총 경험치: ${Math.round(result.requiredExp).toLocaleString()}\n\n` +
        `예상 소요 시간:\n` +
        `- ${result.totalMinutes.toFixed(2)}분\n` +
        `- ${result.totalHours.toFixed(2)}시간\n` +
        `- ${result.totalDays.toFixed(2)}일\n\n` +
        `대략: ${result.days}일 ${result.hours}시간 ${result.minutes}분\n\n` +
        `현재 시간: ${formatDate(now)}\n` +
        `목표 달성 시간: ${formatDate(targetTime)}`;
    }
  </script>

</body>
</html>
