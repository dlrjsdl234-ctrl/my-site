<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이류월드 계산기</title>
  <link rel="stylesheet" href="style.css">
  <script src="common.js"></script>
  <link rel="icon" href="mainImg.png">
</head>
<body>

  <div class="wrapper">
    <div class="container">

      <aside class="sidebar">
        <div class="logo">이류월드 계산기</div>
        <ul class="menu">
          <li><a href="index.html">홈</a></li>
          <li><a href="#" onclick="fnMachine();">환포 계산기</a></li>
          <li><a href="#" onclick="fnExpPage();" class="active">경험치 계산기</a></li>
          <li><a href="#" onclick="fnArtifactPage();">유물 계산기</a></li>
          <li><a href="#" onclick="fnRPSkillPage();">RP 스킬 계산기</a></li>
          <li><a href="transcend.html">초월 정보</a></li>
        </ul>
      </aside>

      <main class="content">
        <div class="top-banner">
          <h1>경험치 시간 계산기</h1>
          <p>현재 레벨, 목표 레벨, 1분당 경험치를 입력해서 필요한 시간을 계산합니다.</p>
        </div>

        <section class="calc-card">
          <!--
          <h2 class="section-title">타이머</h2>

          <div class="timer-row">
            <input id="minutesInput" type="number" placeholder="분 입력" class="timer-input">
            <button type="button" class="btn btn-green" onclick="startTimer()">시작</button>
            <button type="button" class="btn btn-green" onclick="stopTimer()">중지</button>
          </div>

          <div id="display" class="timer-display">--:--</div>
          -->
          <div class="form-list">
            <div class="form-row">
              <label for="currentLv">현재 레벨</label>
              <input type="number" id="currentLv" value="490" min="1">
            </div>

            <div class="form-row">
              <label for="targetLv">목표 레벨</label>
              <input type="number" id="targetLv" value="500" min="1">
            </div>

            <div class="form-row">
              <label for="expPerMinute">1분당 경험치</label>
              <input type="number" id="expPerMinute" value="10000000000000" min="1">
            </div>

            <div class="form-row">
              <label for="hourglassLv">모래시계 레벨</label>
              <input type="number" id="hourglassLv" value="0" min="0" max="20">
            </div>
          </div>

          <div class="action-area">
            <button type="button" class="btn btn-green btn-large" onclick="calcExpTime()">계산하기</button>
          </div>

          <div id="result" class="result-box">여기에 결과가 표시됩니다.</div>
        </section>
      </main>

    </div>
  </div>

  <script src="./exp.js"></script>
  <script>
    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      const h = String(date.getHours()).padStart(2, "0");
      const min = String(date.getMinutes()).padStart(2, "0");

      return `${y}-${m}-${d} ${h}:${min}`;
    }

    function calcExpTime() {
      const resultEl = document.getElementById("result");

      const currentLv = Number(document.getElementById("currentLv").value);
      const targetLv = Number(document.getElementById("targetLv").value);
      const expPerMinute = Number(document.getElementById("expPerMinute").value);
      const hourglassLv = Number(document.getElementById("hourglassLv").value);

      if (typeof calculateLevelUpTime !== "function") {
        resultEl.innerText = "exp.js 로딩 오류";
        return;
      }

      const result = calculateLevelUpTime(
        currentLv,
        targetLv,
        expPerMinute,
        hourglassLv
      );

      if (!result || result.error) {
        resultEl.innerText = result?.error || "오류 발생";
        return;
      }

      const now = new Date();
      const targetTime = new Date(now.getTime() + result.totalMinutes * 60000);

      resultEl.innerHTML = `
        <div class="result-section">
          <div class="result-title">경험치 정보</div>
          <div class="result-row">
            <span class="result-label">기본 필요 총 경험치</span>
            <strong class="result-value">${Math.round(result.baseRequiredExp).toLocaleString()}</strong>
          </div>
          <div class="result-row">
            <span class="result-label">모래시계 레벨</span>
            <strong class="result-value">${hourglassLv}</strong>
          </div>
          <div class="result-row">
            <span class="result-label">모래시계 배율</span>
            <strong class="result-value">${result.multiplier.toFixed(1)}배</strong>
          </div>
          <div class="result-row">
            <span class="result-label">적용 후 필요 총 경험치</span>
            <strong class="result-value">${Math.round(result.requiredExp).toLocaleString()}</strong>
          </div>
        </div>
      
        <div class="result-section">
          <div class="result-title">예상 소요 시간</div>
          <div class="result-grid">
            <div class="time-card">
              <span class="time-label">분</span>
              <strong class="time-value">${result.totalMinutes.toFixed(2)}</strong>
            </div>
            <div class="time-card">
              <span class="time-label">시간</span>
              <strong class="time-value">${result.totalHours.toFixed(2)}</strong>
            </div>
            <div class="time-card">
              <span class="time-label">일</span>
              <strong class="time-value">${result.totalDays.toFixed(2)}</strong>
            </div>
          </div>
          <div class="summary-box">
            대략 <strong>${result.days}일 ${result.hours}시간 ${result.minutes}분</strong>
          </div>
        </div>
      
        <div class="result-section">
          <div class="result-title">시간 정보</div>
          <div class="result-row">
            <span class="result-label">현재 시간</span>
            <strong class="result-value">${formatDate(now)}</strong>
          </div>
          <div class="result-row">
            <span class="result-label">목표 달성 시간</span>
            <strong class="result-value highlight">${formatDate(targetTime)}</strong>
          </div>
        </div>
      `;
    }
  </script>
  <script>
    // 타이머 스크립트
    //const alarm = new Audio("alarm.mp3");

    let timer = null;
    let remainingSeconds = 0;
    
    function startTimer() {
      const minutes = Number(document.getElementById("minutesInput").value);
    
      if (!minutes || minutes <= 0) return;
    
      // 기존 타이머 있으면 정리
      clearInterval(timer);
    
      remainingSeconds = minutes * 60;
    
      updateDisplay();
    
      timer = setInterval(() => {
        remainingSeconds--;
    
        updateDisplay();
    
        if (remainingSeconds <= 0) {
          clearInterval(timer);
          timer = null;
    
          //alarm.play(); // 🔊 알람
          document.getElementById("display").innerText = "⏰ 완료!";
        }
      }, 1000);
    }
    
    function stopTimer() {
      clearInterval(timer);
      timer = null;
      remainingSeconds = 0;
      updateDisplay();
    }
    
    function updateDisplay() {
      const min = Math.floor(remainingSeconds / 60);
      const sec = remainingSeconds % 60;
    
      document.getElementById("display").innerText =
        `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
    }
  </script>

</body>
</html>
