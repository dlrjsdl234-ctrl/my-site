<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>경험치 시간 계산기</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }

    h1 {
      margin-bottom: 24px;
    }

    .row {
      margin-bottom: 8px;
    }

    label {
      display: inline-block;
      width: 120px;
    }

    input {
      width: 200px;
      padding: 4px;
    }

    button {
      margin-top: 16px;
      padding: 8px 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      padding: 12px;
      border: 1px solid #ccc;
      background: #f9f9f9;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <h1>경험치 시간 계산기</h1>

  <div class="row">
    <label for="currentLv">현재 레벨:</label>
    <input type="number" id="currentLv" value="490">
  </div>

  <div class="row">
    <label for="targetLv">목표 레벨:</label>
    <input type="number" id="targetLv" value="500">
  </div>

  <div class="row">
    <label for="expPerNMinutes">획득 경험치:</label>
    <input type="number" id="expPerNMinutes" value="120000000000">
  </div>

  <div class="row">
    <label for="nMinutes">기준 시간(분):</label>
    <input type="number" id="nMinutes" value="1">
  </div>

  <button onclick="calcExpTime()">계산하기</button>

<div id="result"></div>

  <div id="result">여기에 결과가 표시됩니다.</div>

  <script src="exp.js"></script>
  <script>
    function calcExpTime() {
      const resultEl = document.getElementById("result");

      const currentLv = Number(document.getElementById("currentLv").value);
      const targetLv = Number(document.getElementById("targetLv").value);
      const expPerNMinutes = Number(document.getElementById("expPerNMinutes").value);
      const nMinutes = Number(document.getElementById("nMinutes").value);

      if (typeof calculateLevelUpTime !== "function") {
        resultEl.innerText = "오류: exp.js의 calculateLevelUpTime 함수가 없습니다.";
        return;
      }

      const result = calculateLevelUpTime(
        currentLv,
        targetLv,
        expPerNMinutes,
        nMinutes
      );

      if (!result || result.error) {
        resultEl.innerText = result?.error || "알 수 없는 오류가 발생했습니다.";
        return;
      }

      resultEl.innerText =
        `필요 총 경험치: ${result.requiredExp.toLocaleString()}\n` +
        `예상 소요 시간: ${result.totalMinutes.toLocaleString()}분\n` +
        `(${result.days}일 ${result.hours}시간 ${result.minutes}분)`;
    }
  </script>
</body>
</html>
