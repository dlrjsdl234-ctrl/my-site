<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>경험치 시간 계산기</title>
</head>
<body>
  <h1>경험치 시간 계산기</h1>

  <div>
    <label>현재 레벨:</label>
    <input type="number" id="currentLv">
  </div>

  <div>
    <label>목표 레벨:</label>
    <input type="number" id="targetLv">
  </div>

  <div>
    <label>획득 경험치:</label>
    <input type="number" id="expPerNMinutes">
  </div>

  <div>
    <label>기준 시간(분):</label>
    <input type="number" id="nMinutes" placeholder="예: 30">
  </div>

  <br>
  <button onclick="calcExpTime()">계산하기</button>

  <h3 id="result"></h3>

  <script src="exp.js"></script>
  <script>
    function calcExpTime() {
      const currentLv = document.getElementById("currentLv").value;
      const targetLv = document.getElementById("targetLv").value;
      const expPerNMinutes = document.getElementById("expPerNMinutes").value;
      const nMinutes = document.getElementById("nMinutes").value;

      const result = calculateLevelUpTime(
        currentLv,
        targetLv,
        expPerNMinutes,
        nMinutes
      );

      const resultEl = document.getElementById("result");

      if (result.error) {
        resultEl.innerText = result.error;
        return;
      }

      resultEl.innerText =
        `필요 총 경험치: ${result.requiredExp.toLocaleString()}\n` +
        `예상 소요 시간: ${result.totalMinutes.toLocaleString()}분\n` +
        `(${result.days}일 ${result.hours}시간 ${result.minutes}분)`;
    }
  </script>
</body>
</html>
